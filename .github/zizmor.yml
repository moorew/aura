# zizmor configuration — https://docs.zizmor.sh/configuration/
rules:
  cache-poisoning:
    ignore:
      # The release workflows run only on `push: tags` and `workflow_dispatch`
      # — never on untrusted pull requests — so a poisoned cache can't reach
      # them in practice. zizmor flags the cache-capable setup-* actions (and
      # the Windows Rust build cache, which we keep for speed) regardless of the
      # `cache:` input. Accepted, documented risk. We also drop the npm cache
      # from these builds as defense-in-depth.
      - android-release.yml
      - windows-release.yml
